services:
  - type: web
    name: ecommerce-mini
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
